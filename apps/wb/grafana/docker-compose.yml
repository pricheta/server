services:
  grafana:
    image: grafana/grafana:12.4-ubuntu
    container_name: grafana
    restart: unless-stopped

    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 256M

    ports:
      - "3000:3000"

    networks:
      - wb

networks:
  wb:
    driver: bridge
    external: true
