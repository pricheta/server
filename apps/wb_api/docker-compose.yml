services:
  wb_api:
    image: prichetaboss/wp_api:test
    container_name: wb_api
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 256M
    env_file:
      - .env
    ports:
      - "8000:8000"
    restart: unless-stopped
    networks:
      - wb_network

networks:
  wb_network:
    driver: bridge
    external: true