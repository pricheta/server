services:
  postgres:
    image: postgres:16.11-alpine3.23
    container_name: db
    restart: unless-stopped

    ports:
      - "${POSTGRES_PORT}:5432"

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    volumes:
      - ./data:/var/lib/postgresql/data

    networks:
      - pricheta_network

networks:
  pricheta_network:
    driver: bridge
    external: true