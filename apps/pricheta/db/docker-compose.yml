services:
  db:
    image: postgres:16.11-alpine3.23
    container_name: db
    restart: unless-stopped

    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 128M

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: db

    volumes:
      - ./data:/var/lib/postgresql/data

    networks:
      - pricheta

networks:
  pricheta:
    driver: bridge
    external: true